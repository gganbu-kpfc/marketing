<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>서비스 | 깐부파트너스</title>
  <meta name="description" content="네이버 플레이스, 쇼핑 스토어, 셀프 마케팅까지. 실행 중심 마케팅 서비스 소개" />
  <style>
    :root {
      --navy: #0c1d3a;
      --navy-2: #12284d;
      --blue: #1f6fff;
      --blue-dark: #1457d6;
      --green: #03c75a;
      --green-dark: #00a14b;
      --sky: #f4f8ff;
      --soft: #f7f8fa;
      --line: #e7edf5;
      --text: #111827;
      --sub: #475467;
      --white: #ffffff;
      --shadow-sm: 0 12px 30px rgba(12, 29, 58, 0.06);
      --shadow-md: 0 22px 54px rgba(12, 29, 58, 0.12);
      --radius-sm: 16px;
      --radius-md: 24px;
      --radius-lg: 34px;
      --max: 1220px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: "Pretendard", "Noto Sans KR", Arial, sans-serif;
      color: var(--text);
      background: #fff;
      line-height: 1.65;
      -webkit-font-smoothing: antialiased;
    }

    img {
      display: block;
      max-width: 100%;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .container {
      width: min(var(--max), calc(100% - 40px));
      margin: 0 auto;
    }

    .site-header {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: rgba(255,255,255,0.88);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(231,237,245,0.9);
    }

    .header-inner {
      min-height: 84px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
    }

    .logo {
      font-size: 24px;
      font-weight: 900;
      letter-spacing: -0.05em;
      color: var(--navy);
      white-space: nowrap;
    }

    .logo span {
      color: var(--blue);
    }

    .nav {
      display: flex;
      gap: 30px;
      align-items: center;
      flex-wrap: wrap;
    }

    .nav a {
      position: relative;
      font-size: 15px;
      font-weight: 800;
      color: #334155;
    }

    .nav a.active,
    .nav a:hover {
      color: var(--blue);
    }

    .nav a.active::after,
    .nav a:hover::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: -10px;
      width: 100%;
      height: 2px;
      border-radius: 999px;
      background: var(--blue);
    }

    .header-actions {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .btn {
      min-height: 52px;
      padding: 0 22px;
      border-radius: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      transition: 0.2s ease;
      white-space: nowrap;
    }

    .btn:hover {
      transform: translateY(-2px);
    }

    .btn-outline {
      border: 1px solid #cfe0ff;
      color: var(--blue);
      background: #fff;
      box-shadow: var(--shadow-sm);
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--blue), var(--blue-dark));
      color: #fff;
      box-shadow: 0 14px 30px rgba(31,111,255,0.24);
    }

    .hero {
      position: relative;
      overflow: hidden;
      background:
        radial-gradient(circle at 85% 18%, rgba(31,111,255,0.12), transparent 22%),
        radial-gradient(circle at 15% 10%, rgba(3,199,90,0.08), transparent 18%),
        linear-gradient(180deg, #f9fbff 0%, #edf4ff 100%);
      padding: 96px 0 72px;
      border-bottom: 1px solid rgba(31,111,255,0.08);
    }

    .hero-grid {
      display: grid;
      grid-template-columns: 1.08fr 0.92fr;
      gap: 36px;
      align-items: center;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      min-height: 40px;
      padding: 0 14px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 900;
      color: #fff;
      background: linear-gradient(135deg, var(--blue), var(--blue-dark));
      box-shadow: 0 10px 24px rgba(31,111,255,0.18);
      margin-bottom: 20px;
    }

    .hero h1 {
      font-size: clamp(42px, 5vw, 72px);
      line-height: 1.02;
      letter-spacing: -0.07em;
      color: var(--navy);
      margin-bottom: 18px;
    }

    .hero h1 .accent {
      color: var(--blue);
    }

    .hero p {
      font-size: 19px;
      color: var(--sub);
      max-width: 760px;
    }

    .hero-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 30px;
    }

    .hero-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 26px;
    }

    .hero-tag {
      display: inline-flex;
      align-items: center;
      min-height: 40px;
      padding: 0 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.92);
      border: 1px solid rgba(31,111,255,0.12);
      color: var(--navy);
      font-size: 13px;
      font-weight: 800;
      box-shadow: var(--shadow-sm);
    }

    .hero-card {
      border-radius: var(--radius-lg);
      overflow: hidden;
      background: #fff;
      box-shadow: var(--shadow-md);
      border: 1px solid rgba(231,237,245,0.9);
    }

    .hero-card-top {
      padding: 30px 30px 26px;
      color: #fff;
      background: linear-gradient(135deg, var(--navy), var(--blue));
    }

    .hero-card-top h3 {
      font-size: 34px;
      line-height: 1.14;
      letter-spacing: -0.05em;
      margin-bottom: 10px;
    }

    .hero-card-top p {
      color: rgba(255,255,255,0.82);
      font-size: 15px;
    }

    .hero-card-body {
      padding: 24px;
      background: #fff;
    }

    .hero-points {
      display: grid;
      gap: 14px;
    }

    .hero-point {
      display: flex;
      gap: 14px;
      align-items: flex-start;
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 18px;
      background: #fff;
    }

    .hero-point-num {
      width: 40px;
      height: 40px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      background: #eef4ff;
      color: var(--blue);
      font-weight: 900;
      flex: none;
    }

    .hero-point b {
      display: block;
      font-size: 16px;
      color: var(--navy);
      margin-bottom: 4px;
    }

    .hero-point span {
      color: var(--sub);
      font-size: 14px;
    }

    .section {
      padding: 94px 0;
    }

  .service-band {
  border-radius: 40px;
  padding: 70px 60px;
  margin-bottom: 80px;
  box-shadow: 0 30px 70px rgba(12,29,58,0.08);
}

/* ===================== */
/* 1. 네이버 플레이스 */
/* ===================== */

.service-band.naver {
  background: linear-gradient(135deg, #03C75A 0%, #02b351 100%);
  color: white;
}

.service-band.naver h2,
.service-band.naver p {
  color: white;
}

.service-band.naver .service-card {
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(6px);
  border: 1px solid rgba(255,255,255,0.2);
}

/* ===================== */
/* 2. 쇼핑 스토어 */
/* ===================== */

.service-band.shopping {
  background: #ffffff;
  border: 1px solid #e5e7eb;
}

.service-band.shopping .service-card {
  background: #f8fafc;
  border: 1px solid #e5e7eb;
}

/* ===================== */
/* 3. 셀프 마케팅 */
/* ===================== */

.service-band.self {
  background: linear-gradient(135deg, #0c1d3a 0%, #1f6fff 100%);
  color: white;
}

.service-band.self h2,
.service-band.self p {
  color: white;
}

.service-band.self .service-card {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
}

/* ===================== */
/* 공통 카드 */
/* ===================== */

.service-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 24px;
  margin-top: 30px;
}

.service-card {
  padding: 26px;
  border-radius: 24px;
  transition: all 0.3s ease;
}

.service-card:hover {
  transform: translateY(-6px);
  box-shadow: 0 20px 50px rgba(12,29,58,0.12);
}

/* ===================== */
/* 아이콘 */
/* ===================== */

.service-icon {
  width: 42px;
  height: 42px;
  margin-bottom: 14px;
}

/* ===================== */
/* 반응형 */
/* ===================== */

@media (max-width: 768px) {
  .service-grid {
    grid-template-columns: 1fr;
  }

  .service-band {
    padding: 50px 28px;
  }
}
<body>
    <section class="section">
  <div class="container">

    <!-- 네이버 -->
    <div class="service-band naver">
      <h2>네이버 플레이스</h2>
      <p>
        노출이 아니라, 클릭 → 저장 → 문의까지 이어지는 흐름을 만듭니다.
      </p>

      <div class="service-grid">

        <div class="service-card">
          <h3>검색 유입 흐름</h3>
          <p>지도 노출 이후 클릭과 저장까지 이어지도록 설계합니다.</p>
        </div>

        <div class="service-card">
          <h3>리뷰 신뢰 구조</h3>
          <p>보여주기 리뷰가 아닌 실제 방문으로 이어지는 흐름을 만듭니다.</p>
        </div>

        <div class="service-card">
          <h3>업종별 전략</h3>
          <p>병원, 맛집, 미용 등 업종마다 다른 흐름을 적용합니다.</p>
        </div>

      </div>
    </div>

    <!-- 쇼핑 -->
    <div class="service-band shopping">
      <h2>쇼핑 스토어</h2>
      <p>
        상품은 괜찮은데 반응이 없는 상태, 시작 반응을 만드는 구조입니다.
      </p>

      <div class="service-grid">

        <div class="service-card">
          <h3>유입 이후 흐름</h3>
          <p>검색 유입 이후 찜, 클릭 흐름까지 이어지게 설계합니다.</p>
        </div>

        <div class="service-card">
          <h3>관심 신호 생성</h3>
          <p>찜, 조회 등 구매 전 신호를 먼저 만듭니다.</p>
        </div>

        <div class="service-card">
          <h3>전환 구조 개선</h3>
          <p>구매까지 자연스럽게 이어지는 흐름을 만듭니다.</p>
        </div>

      </div>
    </div>

    <!-- 셀프 -->
    <div class="service-band self">
      <h2>셀프 마케팅</h2>
      <p>
        대표가 직접 시작 반응을 선택해 운영할 수 있는 도구형 서비스입니다.
      </p>

      <div class="service-grid">

        <div class="service-card">
          <h3>인스타그램</h3>
          <p>좋아요, 팔로우, 조회수 등 시작 반응 확보</p>
        </div>

        <div class="service-card">
          <h3>유튜브</h3>
          <p>조회수, 좋아요 등 초기 반응 세팅</p>
        </div>

        <div class="service-card">
          <h3>스토어</h3>
          <p>찜, 관심 신호를 직접 선택해서 운영</p>
        </div>

      </div>
    </div>

  </div>
</section>
